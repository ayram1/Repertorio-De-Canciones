name: Deploy to GitHub Pages

on:
  # Se ejecuta cada vez que haces push a la rama main
  push:
    branches: ["main"]
  # Permite ejecutar el flujo de trabajo manualmente desde la pestaña Actions
  workflow_dispatch:

# Otorga los permisos necesarios para que GitHub Actions pueda desplegar
permissions:
  contents: read
  pages: write
  id-token: write

# Permite solo un despliegue a la vez, cancelando los que estén en progreso
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm install
        
      - name: Build
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
